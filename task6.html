<!DOCTYPE html>
<html>
<body>

<script>
let arr = [10, 20, 30, 40, 50];

function showFirstLast() {
    document.write("Array:" +arr +"<br>");
    document.write("First Element: " + arr[0] + "<br>");
    document.write("Last Element: " + arr[arr.length - 1]);
}

showFirstLast();
</script>
